name: Bug Report
description: Something isn't working as expected
labels: ["bug", "needs-triage"]
body:
  - type: checkboxes
    id: known-issues
    attributes:
      label: Pre-flight check
      description: A quick scan of the docs saves everyone time.
      options:
        - label: "I've checked [KNOWN_ISSUES.md](https://github.com/MrityunjayBhardwaj/SonicWeb/blob/main/KNOWN_ISSUES.md) and this isn't already documented as a known limitation"
          required: true
        - label: "I've searched [open issues](https://github.com/MrityunjayBhardwaj/SonicWeb/issues?q=is%3Aissue) for a duplicate"
          required: true

  - type: input
    id: version
    attributes:
      label: SonicWeb version
      description: Click the version label in the top-right of the app's menu bar to copy it. If reporting via the in-app "Report Bug" button, this is pre-filled automatically.
      placeholder: "e.g., 1.4.0 or 1.5.0-beta.0"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: sonic-pi-code
    attributes:
      label: Sonic Pi code
      description: Paste the code that triggers the bug.
      render: ruby

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What should have happened?
    validations:
      required: true

  - type: dropdown
    id: browser
    attributes:
      label: Browser
      options:
        - Chrome
        - Firefox
        - Safari
        - Edge
        - Other
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: OS
      placeholder: "e.g., macOS 14, Windows 11, Ubuntu 24.04"

  - type: dropdown
    id: severity
    attributes:
      label: Severity
      options:
        - "Annoyance — workaround exists"
        - "Significant — no workaround"
        - "Blocking — can't use the app"
    validations:
      required: true

  - type: checkboxes
    id: desktop-comparison
    attributes:
      label: Does this work in desktop Sonic Pi?
      options:
        - label: "Yes, the same code works correctly in desktop Sonic Pi"
        - label: "I haven't tested in desktop Sonic Pi"

  - type: textarea
    id: audio-attachment
    attributes:
      label: Audio attachment (for audio-output bugs)
      description: |
        If the bug is audible (wrong sound, level, FX behaviour, dropout, glitch),
        please attach a WAV. The toolbar's ⏺ Rec → ⏺ Save flow downloads a raw
        float32 WAV of exactly what came out of scsynth. Drag the file into this
        text box or upload to a hosting service and link it. Audio bugs reproduce
        ~10× faster when we can hear what you heard.
