<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Sonic Web</title>
  <meta name="description" content="Live coding music synth in your browser. Based on Sonic Pi by Sam Aaron.">
  <meta name="theme-color" content="#16161e">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="preconnect" href="https://esm.sh">
  <!-- Privacy-friendly analytics by Plausible -->
  <script async src="https://plausible.io/js/pa-VMBejcg_FZ8372vfpK7bD.js"></script>
  <script>
    window.plausible=window.plausible||function(){(plausible.q=plausible.q||[]).push(arguments)},plausible.init=plausible.init||function(i){plausible.o=i||{}};
    plausible.init()
  </script>
  <style>
    /* Critical colors — must match src/app/theme.ts (Tokyo Night) so the
       paint before JS boots does not flash the old palette. If you update
       theme.ts, mirror the values here. */
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      height: 100%;
      overflow: hidden;
      background: #16161e; /* theme.bgDark */
    }
    body {
      font-family: 'Fira Code', 'SF Mono', 'Cascadia Code', 'JetBrains Mono', monospace;
      color: #c0caf5; /* theme.fg */
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }
    /* Scrollbar styling */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #292e42; border-radius: 3px; } /* theme.bgHighlight */
    ::-webkit-scrollbar-thumb:hover { background: #414868; } /* theme.fgFaint */
    /* Selection — deeppink (Desktop SP dt_pink, theme.accent) */
    ::selection { background: rgba(255, 20, 147, 0.35); }
    /* Disable outline on focus for buttons */
    button:focus { outline: none; }
    button:focus-visible { outline: 2px solid #FF1493; outline-offset: 1px; } /* theme.accent */
    select:focus { outline: none; }
    select:focus-visible { outline: 2px solid #FF1493; outline-offset: 1px; } /* theme.accent */
    /* Loading state */
    #app {
      opacity: 0;
      animation: fadeIn 0.3s ease-out 0.1s forwards;
    }
    @keyframes fadeIn {
      to { opacity: 1; }
    }
  </style>
</head>
<body>
  <div id="app"></div>
  <script type="module" src="/src/app/index.ts"></script>
</body>
</html>
